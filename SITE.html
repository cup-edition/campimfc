<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copa Edition - Campim FC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --bg-metal: #1a1a1a;
            --border-metal: #333;
            --gold-start: #f2d06b;
            --gold-mid: #d4af37;
            --gold-end: #b8960f;
            --red-start: #ff1a1a;
            --red-mid: #cc0000;
            --red-end: #990000;
            --text-light: #e0e0e0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Rajdhani', sans-serif;
            padding: 20px;
            background: #0a0a0a;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(212, 175, 55, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 50%, rgba(204, 0, 0, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 100%, rgba(212, 175, 55, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 0%, rgba(204, 0, 0, 0.03) 0%, transparent 50%),
                linear-gradient(180deg, #0a0a0a 0%, #141414 50%, #0a0a0a 100%);
            z-index: 0;
            animation: bgPulse 4s ease-in-out infinite;
        }

        @keyframes bgPulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(rgba(212, 175, 55, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(212, 175, 55, 0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
            pointer-events: none;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(212, 175, 55, 0.3);
            border-radius: 50%;
            animation: floatParticle linear infinite;
        }

        .particle:nth-child(1) { left: 10%; animation-duration: 20s; animation-delay: 0s; width: 3px; height: 3px; }
        .particle:nth-child(2) { left: 20%; animation-duration: 25s; animation-delay: 2s; }
        .particle:nth-child(3) { left: 30%; animation-duration: 18s; animation-delay: 4s; width: 4px; height: 4px; opacity: 0.2; }
        .particle:nth-child(4) { left: 40%; animation-duration: 22s; animation-delay: 1s; }
        .particle:nth-child(5) { left: 50%; animation-duration: 28s; animation-delay: 3s; width: 3px; height: 3px; }
        .particle:nth-child(6) { left: 60%; animation-duration: 19s; animation-delay: 5s; }
        .particle:nth-child(7) { left: 70%; animation-duration: 24s; animation-delay: 2s; width: 4px; height: 4px; opacity: 0.2; }
        .particle:nth-child(8) { left: 80%; animation-duration: 21s; animation-delay: 4s; }
        .particle:nth-child(9) { left: 90%; animation-duration: 26s; animation-delay: 1s; width: 3px; height: 3px; }
        .particle:nth-child(10) { left: 15%; animation-duration: 23s; animation-delay: 3s; }
        .particle:nth-child(11) { left: 45%; animation-duration: 27s; animation-delay: 0s; width: 4px; height: 4px; opacity: 0.15; }
        .particle:nth-child(12) { left: 75%; animation-duration: 20s; animation-delay: 2s; }

        @keyframes floatParticle {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
        }

        .glow-effect {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            z-index: 0;
            background: radial-gradient(ellipse at 30% 40%, rgba(212, 175, 55, 0.03) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 60%, rgba(204, 0, 0, 0.02) 0%, transparent 50%);
            pointer-events: none;
            animation: glowPulse 8s ease-in-out infinite alternate;
        }

        @keyframes glowPulse {
            0% { opacity: 0.5; transform: scale(1) rotate(0deg); }
            100% { opacity: 1; transform: scale(1.1) rotate(3deg); }
        }

        .painel {
            position: relative;
            z-index: 1;
            background: linear-gradient(145deg, rgba(20, 20, 20, 0.92), rgba(5, 5, 5, 0.96));
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            width: 100%;
            max-width: 560px;
            padding: 40px 45px 35px;
            border-radius: 30px;
            border: 1px solid rgba(212, 175, 55, 0.15);
            box-shadow: 
                0 30px 80px rgba(0, 0, 0, 0.8),
                0 0 0 1px rgba(212, 175, 55, 0.05) inset,
                0 0 40px rgba(212, 175, 55, 0.02);
            text-align: center;
            transition: all 0.4s ease;
            overflow: hidden;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .painel:hover {
            box-shadow: 
                0 35px 90px rgba(0, 0, 0, 0.9),
                0 0 0 1px rgba(212, 175, 55, 0.1) inset,
                0 0 60px rgba(212, 175, 55, 0.03);
            transform: translateY(-2px);
        }

        .painel::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.15), rgba(212, 175, 55, 0.35), rgba(212, 175, 55, 0.15), transparent);
            animation: shineBackground 6s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
            filter: blur(10px);
            transform: skewX(-15deg);
        }

        .painel::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 40%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.2), rgba(255, 215, 0, 0.5), rgba(255, 215, 0, 0.2), transparent);
            animation: shineBackground2 6s ease-in-out infinite 1s;
            pointer-events: none;
            z-index: 0;
            filter: blur(15px);
            transform: skewX(-10deg);
        }

        @keyframes shineBackground {
            0% { left: -100%; opacity: 0; }
            15% { opacity: 1; }
            50% { left: 150%; opacity: 1; }
            85% { opacity: 1; }
            100% { left: 200%; opacity: 0; }
        }

        @keyframes shineBackground2 {
            0% { left: -100%; opacity: 0; }
            15% { opacity: 1; }
            50% { left: 150%; opacity: 1; }
            85% { opacity: 1; }
            100% { left: 200%; opacity: 0; }
        }

        .logo-img {
            display: block;
            width: 100%;
            max-width: 420px;
            margin: 0 auto 10px;
            margin-top: -20px;
            filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.6));
            transition: all 0.5s ease;
            position: relative;
            z-index: 1;
        }

        .logo-img:hover {
            transform: scale(1.03) rotate(-1deg);
            filter: drop-shadow(0 15px 40px rgba(212, 175, 55, 0.2));
        }

        .logo-pes {
            display: block;
            width: 100%;
            max-width: 420px;
            margin: 0 auto 5px;
            filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.6));
            transition: all 0.5s ease;
            position: relative;
            z-index: 1;
        }

        .logo-pes:hover {
            transform: scale(1.03) rotate(-1deg);
            filter: drop-shadow(0 15px 40px rgba(212, 175, 55, 0.2));
        }

        /* RODAPÉ COM LOGOS LADO A LADO */
        .footer-logos {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            position: relative;
            z-index: 1;
        }

        .logo-campimfc {
            display: block;
            width: 100%;
            max-width: 55px;
            filter: drop-shadow(0 2px 10px rgba(0, 0, 0, 0.5));
            transition: all 0.3s ease;
        }

        .logo-campimfc:hover {
            transform: scale(1.05);
            filter: drop-shadow(0 4px 20px rgba(212, 175, 55, 0.3));
        }

        .logo-endrill {
            display: block;
            width: 100%;
            max-width: 120px; /* REDUZIDO: antes era 130px */
            filter: drop-shadow(0 2px 10px rgba(0, 0, 0, 0.5));
            transition: all 0.3s ease;
        }

        .logo-endrill:hover {
            transform: scale(1.05);
            filter: drop-shadow(0 4px 20px rgba(212, 175, 55, 0.3));
        }

        .titulo-destaque,
        .subtitulo-temporadas,
        .titulo-pes {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 5px;
            position: relative;
            display: inline-block;
            width: 100%;
            z-index: 1;
            background: linear-gradient(135deg, var(--gold-start), var(--gold-mid), var(--gold-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: textShine 3s linear infinite;
            background-size: 200% auto;
            text-shadow: none;
        }

        @keyframes textShine {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        .titulo-destaque { font-size: 2rem; margin: 0 0 6px; }
        .subtitulo-temporadas { font-size: 1.6rem; letter-spacing: 3px; margin-bottom: 9px; }
        .titulo-pes { font-size: 2rem; letter-spacing: 5px; margin: 0 0 6px; }

        .estatisticas {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin: 0 0 18px;
            padding: 8px 8px;
            background: rgba(212, 175, 55, 0.05);
            border-radius: 12px;
            border: 1px solid rgba(212, 175, 55, 0.08);
            position: relative;
            z-index: 1;
        }

        .stat { display: flex; flex-direction: column; align-items: center; gap: 2px; flex: 1; }

        .stat .numero {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--gold-mid);
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
            transition: all 0.3s ease;
            line-height: 1.2;
        }

        .stat .label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 600;
        }

        .estatisticas:hover .numero { transform: scale(1.1); color: var(--gold-start); }

        .stat-divider {
            width: 2px;
            height: 38px;
            background: rgba(212, 175, 55, 0.25);
            flex-shrink: 0;
            border-radius: 2px;
        }

        .btn {
            display: block;
            background: transparent;
            color: var(--text-light);
            padding: 14px 25px;
            margin: 8px 0;
            text-decoration: none;
            border: 2px solid rgba(255, 255, 255, 0.06);
            border-radius: 50px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 1.4rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(5px);
            z-index: 1;
            transform: perspective(1000px) rotateX(0deg);
        }

        .btn:focus-visible { outline: 3px solid var(--gold-mid); outline-offset: 3px; }
        .btn:active { transform: scale(0.97) !important; transition: transform 0.1s; }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05), transparent);
            transition: left 0.6s ease;
            pointer-events: none;
        }

        .btn:hover::before { left: 100%; }

        .btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.05) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }

        .btn:hover {
            transform: perspective(1000px) rotateX(2deg) translateY(-3px);
            border-color: var(--gold-mid);
            box-shadow: 0 15px 40px rgba(212, 175, 55, 0.1);
            color: #fff;
        }

        .btn:hover::after { opacity: 1; }

        .btn .icon {
            display: inline-block;
            transition: transform 0.3s ease;
            margin-right: 10px;
            font-size: 1.3rem;
        }

        .btn:hover .icon { transform: scale(1.2) rotate(-5deg); }

        .btn-red {
            background: linear-gradient(135deg, rgba(204, 0, 0, 0.9), rgba(153, 0, 0, 0.95));
            color: #fff;
            border-color: rgba(204, 0, 0, 0.3);
            border-width: 2px;
            box-shadow: 0 4px 20px rgba(204, 0, 0, 0.15);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 4px 20px rgba(204, 0, 0, 0.15); }
            50% { box-shadow: 0 4px 40px rgba(204, 0, 0, 0.4); }
        }

        .btn-red:hover {
            background: linear-gradient(135deg, rgba(255, 26, 26, 0.95), rgba(204, 0, 0, 0.95));
            border-color: rgba(255, 26, 26, 0.5);
            box-shadow: 0 8px 40px rgba(204, 0, 0, 0.3);
            transform: perspective(1000px) rotateX(2deg) translateY(-3px);
            animation: none;
        }

        .btn-outline {
            background: rgba(212, 175, 55, 0.03);
            border: 2px solid rgba(212, 175, 55, 0.15);
            color: var(--gold-mid);
        }

        .btn-outline:hover {
            background: rgba(212, 175, 55, 0.08);
            border-color: var(--gold-mid);
            color: var(--gold-start);
            box-shadow: 0 15px 40px rgba(212, 175, 55, 0.08);
        }

        .btn-temporadas {
            background: rgba(212, 175, 55, 0.03);
            border: 2px solid rgba(212, 175, 55, 0.15);
            color: var(--gold-mid);
        }

        .btn-temporadas:hover {
            background: rgba(212, 175, 55, 0.08);
            border-color: var(--gold-mid);
            color: var(--gold-start);
            box-shadow: 0 15px 40px rgba(212, 175, 55, 0.08);
        }

        .divisor {
            height: 2px;
            background: linear-gradient(to right, transparent, var(--gold-mid), var(--red-mid), var(--gold-mid), transparent);
            margin: 20px 0;
            position: relative;
            z-index: 1;
        }

        .divisor::before {
            content: '🏆';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #0a0a0a;
            padding: 0 15px;
            font-size: 1.1rem;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.3));
        }

        .conteudo-wrapper {
            display: flex;
            flex-direction: column;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        @media (max-width: 600px) {
            body { padding: 0; min-height: 100vh; align-items: stretch; }

            .painel {
                max-width: 100%;
                width: 100%;
                padding: 25px 20px 30px;
                border-radius: 0;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                justify-content: center;
                border: none;
                box-shadow: none;
                background: linear-gradient(145deg, rgba(15, 15, 15, 0.95), rgba(5, 5, 5, 0.98));
                backdrop-filter: blur(10px);
                animation: fadeInUp 0.6s ease-out;
            }

            .painel::before {
                width: 80%;
                background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.08), rgba(212, 175, 55, 0.15), rgba(212, 175, 55, 0.08), transparent);
                filter: blur(8px);
                animation: shineBackground 7s ease-in-out infinite;
            }

            .painel::after {
                width: 60%;
                background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.1), rgba(255, 215, 0, 0.2), rgba(255, 215, 0, 0.1), transparent);
                filter: blur(10px);
                animation: shineBackground2 7s ease-in-out infinite 1.5s;
            }

            .conteudo-wrapper { transform: translateY(-10px); }

            .logo-img { max-width: 380px; width: 90%; margin: 0 auto 10px; margin-top: -5px; }
            .logo-pes { max-width: 360px; width: 92%; margin: 0 auto 5px; }

            .logo-campimfc { max-width: 45px; }
            .logo-endrill { max-width: 100px; } /* REDUZIDO: antes era 110px */

            .footer-logos { gap: 12px; }

            .titulo-destaque { font-size: 1.6rem; letter-spacing: 3px; margin: 0 0 5px; }
            .subtitulo-temporadas { font-size: 1.3rem; letter-spacing: 2px; margin-bottom: 7px; }
            .titulo-pes { font-size: 1.6rem; letter-spacing: 3px; margin: 0 0 5px; }

            .estatisticas { gap: 8px; padding: 6px 6px; margin: 0 0 14px; border-radius: 10px; }
            .stat .numero { font-size: 1.4rem; }
            .stat .label { font-size: 0.55rem; letter-spacing: 1.5px; }
            .stat-divider { width: 2px; height: 30px; }

            .btn { font-size: 1.2rem; padding: 14px 25px; margin: 6px 0; }
            .btn .icon { font-size: 1.1rem; margin-right: 8px; }
            .divisor { margin: 16px 0; }
            .particles { display: none; }

            body::before {
                background: 
                    radial-gradient(ellipse at 20% 50%, rgba(212, 175, 55, 0.05) 0%, transparent 60%),
                    radial-gradient(ellipse at 80% 50%, rgba(204, 0, 0, 0.04) 0%, transparent 60%),
                    linear-gradient(180deg, #0a0a0a 0%, #141414 50%, #0a0a0a 100%);
            }

            .glow-effect { display: none; }
            .btn:active { transform: scale(0.95) !important; transition: transform 0.1s; }
            .btn:hover { transform: none !important; }
        }

        @media (max-width: 380px) {
            .painel { padding: 18px 14px 22px; }
            .conteudo-wrapper { transform: translateY(-5px); }
            .logo-img { max-width: 300px; width: 95%; margin: 0 auto 8px; margin-top: -3px; }
            .logo-pes { max-width: 290px; width: 95%; margin: 0 auto 5px; }

            .logo-campimfc { max-width: 35px; }
            .logo-endrill { max-width: 85px; } /* REDUZIDO: antes era 90px */
            .footer-logos { gap: 10px; }

            .titulo-destaque { font-size: 1.3rem; letter-spacing: 2px; margin: 0 0 4px; }
            .subtitulo-temporadas { font-size: 1.1rem; letter-spacing: 2px; margin-bottom: 5px; }
            .titulo-pes { font-size: 1.3rem; letter-spacing: 2px; margin: 0 0 4px; }

            .estatisticas { gap: 5px; padding: 4px 4px; margin: 0 0 10px; border-radius: 8px; }
            .stat .numero { font-size: 1.2rem; }
            .stat .label { font-size: 0.5rem; letter-spacing: 1px; }
            .stat-divider { width: 2px; height: 24px; }

            .btn { font-size: 1.1rem; padding: 14px 25px; margin: 5px 0; }
            .btn .icon { font-size: 1.0rem; margin-right: 6px; }
            .divisor { margin: 12px 0; }

            .painel::before { width: 100%; filter: blur(5px); }
            .painel::after { width: 80%; filter: blur(8px); }
        }

        @media (min-width: 601px) and (max-width: 1024px) {
            .painel { max-width: 90%; padding: 35px 30px; }
            .logo-img { max-width: 350px; margin: 0 auto 10px; margin-top: -18px; }
            .logo-pes { max-width: 380px; }
            .logo-campimfc { max-width: 50px; }
            .logo-endrill { max-width: 110px; } /* REDUZIDO: antes era 120px */
            .titulo-pes { font-size: 1.8rem; }
            .btn { font-size: 1.3rem; padding: 14px 25px; }
            .btn .icon { font-size: 1.2rem; }
        }
    </style>
</head>
