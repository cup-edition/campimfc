<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ CUP EDITION — Ao Vivo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Orbitron:wght@400;600;700;900&display=swap');

  :root {
    --bg-primary: #05080c;
    --bg-secondary: #0a1219;
    --bg-card: rgba(16, 28, 42, 0.85);
    --bg-card-hover: rgba(24, 42, 62, 0.95);
    --border-color: rgba(56, 156, 255, 0.15);
    --border-glow: rgba(56, 156, 255, 0.3);
    --text-primary: #f0f8ff;
    --text-secondary: #8ab4d6;
    --text-muted: #4a6a7a;
    --accent-1: #00d4ff;
    --accent-2: #7b2ffc;
    --accent-3: #ff6b6b;
    --accent-glow: rgba(0, 212, 255, 0.25);
    --gradient-main: linear-gradient(135deg, #00d4ff 0%, #7b2ffc 50%, #ff6b6b 100%);
    --shadow-card: 0 8px 40px rgba(0, 0, 0, 0.6);
    --shadow-glow: 0 0 60px rgba(0, 212, 255, 0.1);
    --radius: 16px;
    --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 10% 20%, rgba(0, 212, 255, 0.05) 0%, transparent 50%),
      radial-gradient(ellipse at 90% 80%, rgba(123, 47, 252, 0.05) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(255, 107, 107, 0.02) 0%, transparent 70%);
    background-attachment: fixed;
  }

  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg-secondary); }
  ::-webkit-scrollbar-thumb { background: var(--gradient-main); border-radius: 4px; }

  .header {
    background: rgba(10, 18, 25, 0.95);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border-color);
    padding: 0 32px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 40px rgba(0, 0, 0, 0.4);
  }
  .header-inner {
    max-width: 1280px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 72px;
  }
  .header-logo {
    height: 60px;
    display: flex;
    align-items: center;
    flex: 1;
    max-width: 280px;
  }
  .header-logo img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    filter: drop-shadow(0 0 30px var(--accent-glow));
    transition: var(--transition);
  }
  .header-logo img:hover {
    filter: drop-shadow(0 0 50px rgba(0, 212, 255, 0.4));
    transform: scale(1.02);
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .live-badge {
    background: var(--accent-3);
    color: #fff;
    font-size: 9px;
    font-weight: 700;
    padding: 4px 14px;
    border-radius: 20px;
    letter-spacing: 2px;
    animation: pulse-live 1.5s infinite;
    text-transform: uppercase;
    box-shadow: 0 0 30px rgba(255, 107, 107, 0.3);
    flex-shrink: 0;
  }
  @keyframes pulse-live {
    0%, 100% { opacity: 1; box-shadow: 0 0 30px rgba(255, 107, 107, 0.3); }
    50% { opacity: 0.7; box-shadow: 0 0 60px rgba(255, 107, 107, 0.1); }
  }

  .header-time {
    font-size: 12px;
    color: var(--text-muted);
    font-family: 'Orbitron', sans-serif;
    font-weight: 600;
    letter-spacing: 1px;
    flex-shrink: 0;
  }

  .status-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #00e676;
    display: inline-block;
    box-shadow: 0 0 20px rgba(0, 230, 118, 0.4);
    animation: pulse-dot 2s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes pulse-dot {
    0%, 100% { box-shadow: 0 0 20px rgba(0, 230, 118, 0.4); }
    50% { box-shadow: 0 0 40px rgba(0, 230, 118, 0.1); }
  }

  .status-text {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 1px;
    font-weight: 600;
    flex-shrink: 0;
  }

  .main-nav {
    background: rgba(10, 18, 25, 0.8);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border-color);
  }
  .main-nav-inner {
    max-width: 1280px;
    margin: 0 auto;
    display: flex;
    gap: 4px;
    padding: 0 4px;
  }
  .nav-tab {
    padding: 14px 28px;
    font-size: 12px;
    font-weight: 700;
    color: var(--text-muted);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: var(--transition);
    font-family: 'Inter', sans-serif;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    border-bottom: 3px solid transparent;
    text-transform: uppercase;
    letter-spacing: 1px;
    border-radius: 8px 8px 0 0;
  }
  .nav-tab:hover {
    color: var(--text-primary);
    background: rgba(0, 212, 255, 0.03);
  }
  .nav-tab.active {
    color: var(--accent-1);
    border-bottom-color: var(--accent-1);
    background: rgba(0, 212, 255, 0.05);
    box-shadow: inset 0 -3px 0 var(--accent-1);
  }

  .container { max-width: 1280px; margin: 0 auto; padding: 32px 24px; }

  .section { display: none; animation: fadeIn 0.5s ease; }
  .section.active { display: block; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .section-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 20px;
    font-weight: 700;
    background: var(--gradient-main);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 2px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--border-color), transparent);
  }

  .stat-boxes {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }
  .stat-box {
    background: var(--bg-card);
    backdrop-filter: blur(20px);
    border: 1px solid var(--border-color);
    border-radius: var(--radius);
    padding: 24px;
    text-align: center;
    transition: var(--transition);
    position: relative;
    overflow: hidden;
  }
  .stat-box::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--gradient-main);
    animation: shimmer 3s ease-in-out infinite;
  }
  @keyframes shimmer {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }
  .stat-box:hover {
    border-color: var(--border-glow);
    transform: translateY(-4px);
    box-shadow: var(--shadow-card), var(--shadow-glow);
  }
  .stat-box-num {
    font-family: 'Orbitron', sans-serif;
    font-size: 42px;
    font-weight: 900;
    background: var(--gradient-main);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1;
  }
  .stat-box-label {
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-top: 8px;
    font-weight: 600;
  }

  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .card {
    background: var(--bg-card);
    backdrop-filter: blur(20px);
    border: 1px solid var(--border-color);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow-card);
    transition: var(--transition);
  }
  .card:hover {
    border-color: var(--border-glow);
    transform: translateY(-2px);
    box-shadow: var(--shadow-card), var(--shadow-glow);
  }
  .card-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 14px;
    font-weight: 700;
    background: var(--gradient-main);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }

  .season-pub-card {
    background: var(--bg-card);
    backdrop-filter: blur(20px);
    border: 1px solid var(--border-color);
    border-radius: var(--radius);
    padding: 20px 28px;
    display: flex;
    align-items: center;
    gap: 24px;
    transition: var(--transition);
    box-shadow: var(--shadow-card);
    cursor: pointer;
    margin-bottom: 12px;
  }
  .season-pub-card:hover {
    border-color: var(--border-glow);
    transform: translateX(4px);
    box-shadow: var(--shadow-card), var(--shadow-glow);
  }
  .season-pub-card.active {
    border-color: var(--accent-3);
    box-shadow: 0 0 40px rgba(255, 107, 107, 0.08);
  }
  .season-pub-year {
    font-family: 'Orbitron', sans-serif;
    font-size: 38px;
    font-weight: 900;
    color: var(--accent-1);
    min-width: 80px;
    flex-shrink: 0;
    line-height: 1;
  }
  .season-pub-year.active { color: var(--accent-3); }
  .season-info {
    flex: 1;
  }
  .season-pub-name {
    font-size: 16px;
    font-weight: 700;
  }
  .season-pub-desc {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
  }
  .season-pub-badge { 
    margin-left: auto;
    flex-shrink: 0;
  }
  .season-pub-expand {
    font-size: 24px;
    color: var(--text-muted);
    transition: var(--transition);
    flex-shrink: 0;
  }
  .season-pub-card:hover .season-pub-expand {
    color: var(--accent-1);
  }

  .edicoes-container {
    margin-top: 12px;
    padding-left: 20px;
    border-left: 2px solid var(--border-color);
    display: none;
  }
  .edicoes-container.open { display: block; }

  .edicao-item {
    background: rgba(5, 8, 12, 0.4);
    border: 1px solid var(--border-color);
    border-radius: 12px;
    padding: 14px 18px;
    margin-bottom: 10px;
    transition: var(--transition);
    cursor: pointer;
  }
  .edicao-item:hover {
    border-color: var(--border-glow);
    background: rgba(0, 212, 255, 0.03);
  }
  .edicao-header {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .edicao-num {
    font-family: 'Orbitron', sans-serif;
    font-size: 18px;
    font-weight: 900;
    color: var(--accent-1);
    min-width: 50px;
  }
  .edicao-campeao {
    display: flex;
    align-items: center;
    gap: 8px;
    color: #ffd600;
    font-weight: 700;
    font-size: 14px;
  }
  .edicao-artilheiros {
    font-size: 12px;
    color: var(--text-muted);
  }
  .edicao-data {
    font-size: 12px;
    color: var(--text-muted);
    margin-left: auto;
  }
  .edicao-expand {
    font-size: 18px;
    color: var(--text-muted);
    transition: var(--transition);
  }

  .edicao-detalhes {
    margin-top: 14px;
    padding: 20px;
    background: rgba(5, 8, 12, 0.3);
    border-radius: 10px;
    border: 1px solid var(--border-color);
    display: none;
  }
  .edicao-detalhes.open { display: block; }

  .edicao-detalhes-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  @media (max-width: 768px) {
    .edicao-detalhes-grid { grid-template-columns: 1fr; }
    .grid-2 { grid-template-columns: 1fr; }
    .stat-boxes { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 480px) {
    .stat-boxes { grid-template-columns: 1fr; }
    .season-pub-year { font-size: 24px; min-width: 50px; }
    .season-pub-card { flex-wrap: wrap; }
  }

  .detail-card {
    background: rgba(5, 8, 12, 0.4);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .detail-card:last-child { margin-bottom: 0; }
  .detail-card-title {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 2px;
    font-weight: 700;
    margin-bottom: 10px;
    border-bottom: 1px solid var(--border-color);
    padding-bottom: 6px;
  }

  .final-match-display {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 8px 0;
    font-size: 18px;
    font-weight: 700;
    flex-wrap: wrap;
  }
  .final-team {
    text-align: center;
    min-width: 80px;
  }
  .final-escudo {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    margin: 0 auto 6px;
    overflow: hidden;
    border: 2px solid var(--border-color);
    background: rgba(5, 8, 12, 0.5);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .final-escudo img { width: 100%; height: 100%; object-fit: contain; padding: 4px; }
  .final-escudo .fallback { font-size: 24px; }
  .final-nome { font-size: 14px; font-weight: 600; }
  .final-score {
    font-family: 'Orbitron', sans-serif;
    font-size: 32px;
    font-weight: 900;
    color: var(--accent-1);
  }
  .final-score.gold { color: #ffd600; }

  .table-wrap { overflow-x: auto; border-radius: 8px; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  thead th {
    padding: 8px 12px;
    text-align: left;
    font-size: 9px;
    font-weight: 800;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    border-bottom: 2px solid var(--border-color);
    background: rgba(5, 8, 12, 0.5);
  }
  tbody td {
    padding: 8px 12px;
    border-bottom: 1px solid rgba(56, 156, 255, 0.05);
    vertical-align: middle;
    font-size: 12px;
  }
  tbody tr:hover { background: rgba(0, 212, 255, 0.03); }
  tbody tr:last-child td { border-bottom: none; }

  .pos-badge-mini {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    font-size: 12px;
    font-family: 'Orbitron', sans-serif;
  }
  .pos-1-mini { background: linear-gradient(135deg, #ffd600, #f5a623); color: #000; }
  .pos-2-mini { background: linear-gradient(135deg, #b0bec5, #78909c); color: #000; }
  .pos-other-mini { background: var(--border-color); color: var(--text-muted); }

  .artilheiro-mini {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 0;
    border-bottom: 1px solid rgba(56, 156, 255, 0.05);
  }
  .artilheiro-mini:last-child { border-bottom: none; }
  .artilheiro-mini .foto-mini {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    overflow: hidden;
    border: 2px solid #ffd600;
    background: rgba(5, 8, 12, 0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .artilheiro-mini .foto-mini img { width: 100%; height: 100%; object-fit: cover; }
  .artilheiro-mini .foto-mini .fallback { font-size: 16px; }
  .artilheiro-mini .art-nome { font-weight: 600; flex: 1; font-size: 14px; }
  .artilheiro-mini .art-time { font-size: 11px; color: var(--text-muted); }
  .artilheiro-mini .art-gols {
    font-family: 'Orbitron', sans-serif;
    font-size: 20px;
    font-weight: 900;
    color: var(--accent-1);
  }
  .artilheiro-mini .art-gols.gold { color: #ffd600; }

  .gols-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
    max-height: 400px;
    overflow-y: auto;
  }
  .gol-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 12px;
    background: rgba(5, 8, 12, 0.2);
    border-radius: 6px;
    font-size: 13px;
    border-left: 3px solid var(--border-color);
  }
  .gol-item.final-gol {
    border-left-color: #ffd600;
    background: rgba(255, 215, 0, 0.05);
  }
  .gol-item .gol-foto {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    overflow: hidden;
    border: 1px solid var(--border-color);
    background: rgba(5, 8, 12, 0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .gol-item .gol-foto img { width: 100%; height: 100%; object-fit: cover; }
  .gol-item .gol-foto .fallback { font-size: 14px; }
  .gol-item .gol-nome { font-weight: 600; flex: 1; font-size: 14px; }
  .gol-item .gol-time { font-size: 11px; color: var(--text-muted); }
  .gol-item .gol-fase {
    font-size: 10px;
    color: var(--accent-1);
    font-weight: 700;
    letter-spacing: 1px;
  }
  .gol-item .gol-fase.final-fase { color: #ffd600; }
  .gol-item .gol-qtd {
    font-family: 'Orbitron', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--accent-1);
  }
  .gol-item .gol-detalhes {
    font-size: 10px;
    color: var(--text-muted);
  }

  .status-badge {
    padding: 3px 12px;
    border-radius: 20px;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1px;
    display: inline-block;
    text-transform: uppercase;
  }
  .status-andamento { background: rgba(255, 107, 107, 0.12); color: var(--accent-3); }
  .status-encerrado { background: rgba(74, 106, 122, 0.12); color: var(--text-muted); }
  .status-planejado { background: rgba(0, 212, 255, 0.12); color: var(--accent-1); }

  .empty-pub {
    text-align: center;
    padding: 64px 24px;
    color: var(--text-muted);
  }
  .empty-pub .icon { font-size: 56px; margin-bottom: 16px; opacity: 0.5; }
  .empty-pub p { font-size: 14px; }

  .stats-table-wrap { overflow-x: auto; border-radius: 12px; }
  .stats-table-wrap table { font-size: 12px; }
  .stats-table-wrap thead th {
    padding: 6px 10px;
    font-size: 8px;
    text-align: center;
  }
  .stats-table-wrap tbody td {
    padding: 6px 10px;
    text-align: center;
    font-size: 12px;
  }
  .stats-table-wrap tbody td:first-child { text-align: left; }
  .stats-table-wrap .player-cell {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .stats-table-wrap .player-cell .avatar-mini {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    overflow: hidden;
    border: 1px solid var(--border-color);
    background: rgba(5, 8, 12, 0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .stats-table-wrap .player-cell .avatar-mini img { width: 100%; height: 100%; object-fit: cover; }
  .stats-table-wrap .player-cell .avatar-mini .fallback { font-size: 14px; }
  .stats-table-wrap .player-cell .player-name { font-weight: 600; font-size: 13px; }
  .stats-table-wrap .player-cell .player-team { font-size: 10px; color: var(--text-muted); }
  .stat-num { font-family: 'Orbitron', sans-serif; font-weight: 700; }
  .stat-gols { color: var(--accent-1); font-size: 16px; }
  .stat-titulos { color: #ffd600; font-size: 16px; }
  .stat-vices { color: #b0bec5; font-size: 16px; }
  .stat-artilharias { color: var(--accent-1); font-size: 16px; }
  .stat-edicoes { color: var(--text-muted); font-size: 16px; }
  .stat-partidas { color: var(--text-muted); font-size: 16px; }

  .edicao-footer {
    margin-top: 16px;
    font-size: 11px;
    color: var(--text-muted);
    text-align: center;
    border-top: 1px solid var(--border-color);
    padding-top: 12px;
  }
  .edicao-footer span { margin: 0 8px; }

  .gol-stats {
    display: flex;
    gap: 4px;
    font-size: 10px;
    color: var(--text-muted);
  }
  .gol-stats .fg { color: var(--accent-1); }
  .gol-stats .f { color: #ffd600; }
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="header-logo">
      <img src="https://cup-edition.github.io/sistema-inscricoes/CUP%20EDITION%20CAMPIM%20FC.png" alt="CUP EDITION">
    </div>
    <div class="header-right">
      <span class="live-badge">● AO VIVO</span>
      <div class="header-time" id="clock"></div>
      <span class="status-dot"></span>
      <span class="status-text">EM TEMPO REAL</span>
    </div>
  </div>
</header>

<nav class="main-nav">
  <div class="main-nav-inner">
    <button class="nav-tab active" onclick="showSection('dashboard', this)">📊 Dashboard</button>
    <button class="nav-tab" onclick="showSection('temporadas', this)">📅 Temporadas</button>
  </div>
</nav>

<div class="container">

function calcClassificacaoPorTemporada(tempId) {
  var partidas = state.partidas.filter(function(p) {
    return p.temporadaId === tempId && p.fase === 'Fase de Grupos' && p.status === 'encerrada' &&
      isPlacarDefinido(p.gols1) && isPlacarDefinido(p.gols2);
  });

  var tabela = {};
  state.times.forEach(function(t) {
    tabela[t.id] = { id: t.id, nome: t.nome, escudo: t.escudo, j: 0, v: 0, e: 0, d: 0, gp: 0, gc: 0, sg: 0, pts: 0 };
  });

  partidas.forEach(function(p) {
    var g1 = parseInt(p.gols1), g2 = parseInt(p.gols2);
    if (!tabela[p.time1Id] || !tabela[p.time2Id]) return;
    var t1 = tabela[p.time1Id], t2 = tabela[p.time2Id];
    t1.j++; t2.j++;
    t1.gp += g1; t1.gc += g2;
    t2.gp += g2; t2.gc += g1;
    if (g1 > g2) { t1.v++; t1.pts += 3; t2.d++; }
    else if (g2 > g1) { t2.v++; t2.pts += 3; t1.d++; }
    else { t1.e++; t1.pts++; t2.e++; t2.pts++; }
    t1.sg = t1.gp - t1.gc; t2.sg = t2.gp - t2.gc;
  });

  return Object.values(tabela).sort(function(a, b) {
    return b.pts - a.pts || b.sg - a.sg || b.gp - a.gp;
  });
}

function renderTemporadas() {
  var el = document.getElementById('pub-temporadas');
  if (!el) return;
  if (!state.temporadas.length) {
    el.innerHTML = '<div class="empty-pub"><div class="icon">📅</div><p>Nenhuma temporada cadastrada</p></div>';
    return;
  }

  var statusClass = { em_andamento:'status-andamento', encerrado:'status-encerrado', planejado:'status-planejado' };

  var sorted = state.temporadas.slice().sort(function(a, b) {
    return (b.ano || '').localeCompare(a.ano || '');
  });

  var html = '';
  sorted.forEach(function(t) {
    // 🔥 ORDENA AS EDIÇÕES DA MAIS RECENTE PARA A MAIS ANTIGA
    var edicoes = state.edicoes.filter(function(e) { return e.temporadaId === t.id; });
    edicoes.sort(function(a, b) { 
      // Ordena por número decrescente (mais recente primeiro)
      return (b.numero || 0) - (a.numero || 0);
    });

    var isActive = t.status === 'em_andamento';

      edicoesHtml = '<div class="edicoes-container open" id="edicoes-'+t.id+'">';
      edicoes.forEach(function(e) {
        var campeao = e.campeao?.nome || e.titulo?.campeao?.nome || 'N/A';
        var artilheirosList = e.artilheiros || e.titulo?.artilheiros || [];
        var artStr = artilheirosList.length > 0 ? artilheirosList.map(function(a) { return a.nome; }).join(', ') : '—';

        edicoesHtml += '<div class="edicao-item" onclick="event.stopPropagation();toggleEdicaoDetalhes(\''+e.id+'\')">' +
          '<div class="edicao-header">' +
            '<span class="edicao-num">'+ordinal(e.numero || 1)+'</span>' +
            '<span class="edicao-campeao">'+imgOrEmoji(e.campeao?.escudo || e.titulo?.campeao?.escudo, 24)+' 🏆 '+campeao+'</span>' +
            '<span class="edicao-artilheiros">🎯 '+artStr+'</span>' +
            '<span class="edicao-data">📅 '+(e.dataEdicao || '—')+'</span>' +
            '<span class="edicao-expand" id="expand-'+e.id+'">▶</span>' +
          '</div>' +
          '<div class="edicao-detalhes" id="detalhes-'+e.id+'">' +
            renderEdicaoDetalhes(e) +
          '</div>' +
        '</div>';
      });
      edicoesHtml += '</div>';
    } else {
      edicoesHtml = '<div class="edicoes-container" style="display:block;padding:12px 20px;color:var(--text-muted);font-size:13px;">Nenhuma edição finalizada para esta temporada</div>';
    }

    html += '<div class="season-pub-card '+(isActive?'active':'')+'" onclick="toggleEdicoes(\''+t.id+'\')">' +
      '<div class="season-pub-year '+(isActive?'active':'')+'">'+t.ano+'</div>' +
      '<div class="season-info">' +
        '<div class="season-pub-name">'+t.nome+'</div>' +
        '<div class="season-pub-desc">'+(t.descricao||'')+'</div>' +
        '<div style="font-size:11px;color:var(--text-muted);margin-top:4px;">📋 '+edicoes.length+' edição(ões)</div>' +
      '</div>' +
      '<div class="season-pub-badge"><span class="status-badge '+(statusClass[t.status]||'')+'">'+(statusLabel[t.status]||t.status)+'</span></div>' +
      '<span class="season-pub-expand" id="season-expand-'+t.id+'">'+(edicoes.length ? '▼' : '—')+'</span>' +
    '</div>' + edicoesHtml;
  });

  el.innerHTML = html;

  document.querySelectorAll('.edicao-detalhes').forEach(function(d) { d.classList.remove('open'); });
}

function toggleEdicoes(tempId) {
  var container = document.getElementById('edicoes-'+tempId);
  var expand = document.getElementById('season-expand-'+tempId);
  if (!container) return;
  var isOpen = container.style.display !== 'none';
  container.style.display = isOpen ? 'none' : 'block';
  if (expand) expand.textContent = isOpen ? '▶' : '▼';
}

function toggleEdicaoDetalhes(edicaoId) {
  var detalhes = document.getElementById('detalhes-'+edicaoId);
  var expand = document.getElementById('expand-'+edicaoId);
  if (!detalhes) return;
  var isOpen = detalhes.classList.contains('open');
  detalhes.classList.toggle('open');
  if (expand) expand.textContent = isOpen ? '▶' : '▼';
}

/* ======================================================================
   DETALHES DA EDIÇÃO — mesma estrutura e conteúdo do modal "visualizarEdicao"
   do painel admin, adaptada para exibição inline (sem modal/overlay).
   ====================================================================== */
function renderEdicaoDetalhes(edicao) {
  var timeCampeao = state.times.find(function(t) { return t.id === (edicao.campeao?.timeId || edicao.titulo?.campeao?.timeId); });
  var timeVice = state.times.find(function(t) { return t.id === (edicao.vice?.timeId || edicao.titulo?.vice?.timeId); });
  var time1Final = state.times.find(function(t) { return t.id === edicao.final?.time1Id; });
  var time2Final = state.times.find(function(t) { return t.id === edicao.final?.time2Id; });

  var artilheiros = edicao.artilheiros || (edicao.titulo?.artilheiros || []);

  if (artilheiros.length === 0 && edicao.artilheiro) {
    artilheiros = [{
      jogadorId: edicao.artilheiro.jogadorId || '',
      nome: edicao.artilheiro.nome || 'Desconhecido',
      gols: edicao.artilheiro.gols || 0,
      timeNome: edicao.artilheiro.timeNome || ''
    }];
  }

  if (artilheiros.length === 0 && edicao.todosOsGols && edicao.todosOsGols.length > 0) {
    var maxGols = Math.max.apply(null, edicao.todosOsGols.map(function(j) { return j.gols || 0; }));
    if (maxGols > 0) {
      artilheiros = edicao.todosOsGols.filter(function(j) { return j.gols === maxGols; }).map(function(j) {
        return { jogadorId: j.id || '', nome: j.nome || 'Desconhecido', gols: j.gols || 0, timeNome: j.timeNome || '' };
      });
    }
  }

  var tevePenalidades = edicao.final?.tevePenalidades || false;

  var penaltyInfo = '';
  if (tevePenalidades && edicao.final) {
    var g1p = edicao.final.golsPenalidades1 || 0;
    var g2p = edicao.final.golsPenalidades2 || 0;
    penaltyInfo = '<div style="font-size:13px;color:#ff6b6b;font-weight:700;margin-top:4px;">⚽ Pênaltis: '+g1p+' × '+g2p+'</div>';
    if (edicao.final.penalties && edicao.final.penalties.winner) {
      penaltyInfo += '<div style="font-size:13px;color:#ffd600;font-weight:700;">🏆 Vencedor nos pênaltis: '+edicao.final.penalties.winner+'</div>';
    }
  }

  function escudoInline(time, size) {
    if (time && time.escudo && (time.escudo.startsWith('http') || time.escudo.startsWith('data:'))) {
      return '<img src="'+time.escudo+'" style="width:100%;height:100%;object-fit:contain;padding:'+(size>40?4:2)+'px;">';
    }
    return '<span style="font-size:'+Math.round(size*0.55)+'px;">'+((time && time.escudo) || '⚽')+'</span>';
  }

  var html = '';

  html += '<div style="font-size:13px;color:var(--text-muted);margin-bottom:16px;">'+
    '📅 '+(edicao.dataEdicao || 'Data não definida')+' • ⚽ '+(edicao.totalPartidas||0)+' partidas • 🎯 '+(edicao.totalGols||0)+' gols'+
    (edicao.totalJogadoresParticipantes ? ' • 👤 '+edicao.totalJogadoresParticipantes+' jogadores' : '')+
    (tevePenalidades ? ' • ⚽ Decidido nos pênaltis' : '')+
  '</div>';

  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;">'+
    '<div style="background:rgba(5,8,12,0.4);border-radius:10px;padding:16px;border:1px solid var(--border-color);text-align:center;">'+
      '<div style="font-size:11px;color:var(--text-muted);">🏆 CAMPEÃO</div>'+
      '<div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-top:4px;">'+
        '<div style="width:32px;height:32px;border-radius:50%;overflow:hidden;border:2px solid var(--border-color);background:rgba(5,8,12,0.5);display:flex;align-items:center;justify-content:center;flex-shrink:0;">'+escudoInline(timeCampeao, 32)+'</div>'+
        '<span style="font-size:18px;font-weight:700;color:#ffd600;">'+(edicao.campeao?.nome || edicao.titulo?.campeao?.nome || 'N/A')+'</span>'+
      '</div>'+
    '</div>'+
    '<div style="background:rgba(5,8,12,0.4);border-radius:10px;padding:16px;border:1px solid var(--border-color);text-align:center;">'+
      '<div style="font-size:11px;color:var(--text-muted);">🥈 VICE</div>'+
      '<div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-top:4px;">'+
        '<div style="width:32px;height:32px;border-radius:50%;overflow:hidden;border:2px solid var(--border-color);background:rgba(5,8,12,0.5);display:flex;align-items:center;justify-content:center;flex-shrink:0;">'+escudoInline(timeVice, 32)+'</div>'+
        '<span style="font-size:18px;font-weight:700;color:var(--text-secondary);">'+(edicao.vice?.nome || edicao.titulo?.vice?.nome || 'N/A')+'</span>'+
      '</div>'+
    '</div>'+
  '</div>';

  if (artilheiros.length > 0) {
    html += '<div style="background:rgba(255,215,0,0.05);border:1px solid rgba(255,215,0,0.2);border-radius:10px;padding:12px 16px;margin-bottom:16px;">'+
      '<div style="font-size:12px;color:var(--text-muted);text-align:center;margin-bottom:6px;">🎯 ARTILHEIRO(S) DA EDIÇÃO</div>'+
      '<div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;">'+
        artilheiros.map(function(a) {
          return '<div style="display:flex;align-items:center;gap:8px;background:rgba(255,215,0,0.1);padding:6px 16px 6px 10px;border-radius:20px;border:1px solid rgba(255,215,0,0.3);">'+
            '<div style="width:32px;height:32px;border-radius:50%;overflow:hidden;border:2px solid #ffd600;background:rgba(5,8,12,0.5);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 0 20px rgba(255,215,0,0.2);">'+
              getPlayerAvatarHTML(a.jogadorId, a.nome, 32)+
            '</div>'+
            '<span style="font-size:15px;font-weight:700;color:#ffd600;">'+a.nome+'</span>'+
            '<span style="font-size:13px;color:var(--text-muted);">('+a.gols+' ⚽)</span>'+
            '<span style="font-size:16px;">🎯</span>'+
          '</div>';
        }).join('')+
      '</div>'+
    '</div>';
  }

  html += '<div style="background:rgba(5,8,12,0.4);border-radius:10px;padding:16px;border:1px solid var(--border-color);margin-bottom:16px;">'+
    '<div style="font-size:14px;font-weight:700;color:var(--text-secondary);margin-bottom:8px;">🏟️ FINAL</div>'+
    '<div style="display:flex;align-items:center;justify-content:center;gap:16px;font-size:20px;font-weight:700;flex-wrap:wrap;">'+
      '<div style="text-align:center;">'+
        '<div style="display:flex;align-items:center;gap:8px;justify-content:center;">'+
          '<div style="width:28px;height:28px;border-radius:50%;overflow:hidden;border:2px solid var(--border-color);background:rgba(5,8,12,0.5);display:flex;align-items:center;justify-content:center;flex-shrink:0;">'+escudoInline(time1Final, 28)+'</div>'+
          '<span style="font-size:14px;">'+(edicao.final?.time1Nome || '?')+'</span>'+
        '</div>'+
        (edicao.final?.jogadoresTime1?.length ?
          '<div style="font-size:11px;color:var(--text-muted);margin-top:4px;">'+
            edicao.final.jogadoresTime1.map(function(j) {
              return '<span style="display:inline-flex;align-items:center;gap:4px;margin:2px;">'+
                '<span style="display:inline-block;width:18px;height:18px;border-radius:50%;overflow:hidden;border:1px solid var(--border-color);background:rgba(5,8,12,0.5);">'+getPlayerAvatarHTML(j.id, j.nome, 18)+'</span>'+
                j.nome+(j.gols > 0 ? ' ⚽'+j.gols : '')+
              '</span>';
            }).join(' ')+
          '</div>' : '')+
      '</div>'+
      '<span style="color:var(--accent-1);font-family:\'Orbitron\',sans-serif;font-size:24px;">'+(edicao.final?.gols1||0)+' × '+(edicao.final?.gols2||0)+'</span>'+
      '<div style="text-align:center;">'+
        '<div style="display:flex;align-items:center;gap:8px;justify-content:center;">'+
          '<span style="font-size:14px;">'+(edicao.final?.time2Nome || '?')+'</span>'+
          '<div style="width:28px;height:28px;border-radius:50%;overflow:hidden;border:2px solid var(--border-color);background:rgba(5,8,12,0.5);display:flex;align-items:center;justify-content:center;flex-shrink:0;">'+escudoInline(time2Final, 28)+'</div>'+
        '</div>'+
        (edicao.final?.jogadoresTime2?.length ?
          '<div style="font-size:11px;color:var(--text-muted);margin-top:4px;">'+
            edicao.final.jogadoresTime2.map(function(j) {
              return '<span style="display:inline-flex;align-items:center;gap:4px;margin:2px;">'+
                '<span style="display:inline-block;width:18px;height:18px;border-radius:50%;overflow:hidden;border:1px solid var(--border-color);background:rgba(5,8,12,0.5);">'+getPlayerAvatarHTML(j.id, j.nome, 18)+'</span>'+
                j.nome+(j.gols > 0 ? ' ⚽'+j.gols : '')+
              '</span>';
            }).join(' ')+
          '</div>' : '')+
      '</div>'+
    '</div>'+
    penaltyInfo+
    (edicao.final?.eventos?.length ?
      '<div style="margin-top:8px;font-size:12px;color:var(--text-muted);text-align:center;border-top:1px solid var(--border-color);padding-top:8px;">'+
        '⚽ Gols: '+edicao.final.eventos.map(function(ev) { return ev.jogadorNome; }).join(', ')+
      '</div>' : '')+
  '</div>';

  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;">'+
    '<div style="background:rgba(5,8,12,0.4);border-radius:10px;padding:16px;border:1px solid var(--border-color);">'+
      '<div style="font-size:14px;font-weight:700;color:var(--text-secondary);margin-bottom:8px;">🎯 TODOS OS GOLS DA EDIÇÃO</div>'+
      (edicao.todosOsGols?.length ?
        '<div style="display:flex;flex-direction:column;gap:2px;max-height:300px;overflow-y:auto;">'+
          edicao.todosOsGols.map(function(j) {
            var isArtilheiro = artilheiros.some(function(a) { return a.nome === j.nome || a.jogadorId === j.id; });
            return '<div style="display:flex;align-items:center;gap:8px;padding:4px 8px;background:'+(isArtilheiro?'rgba(255,215,0,0.08)':'rgba(5,8,12,0.2)')+';border-radius:4px;border:'+(isArtilheiro?'1px solid rgba(255,215,0,0.2)':'none')+';">'+
              '<div style="width:24px;height:24px;border-radius:50%;overflow:hidden;border:'+(isArtilheiro?'2px solid #ffd600':'1px solid var(--border-color)')+';background:rgba(5,8,12,0.5);display:flex;align-items:center;justify-content:center;flex-shrink:0;">'+
                getPlayerAvatarHTML(j.id, j.nome, 24)+
              '</div>'+
              '<span style="font-weight:'+(isArtilheiro?'700':'600')+';flex:1;color:'+(isArtilheiro?'#ffd600':'var(--text-primary)')+';">'+j.nome+'</span>'+
              '<span style="font-size:11px;color:var(--text-muted);">'+j.timeNome+'</span>'+
              '<span style="color:'+(isArtilheiro?'#ffd600':'var(--accent-1)')+';font-weight:700;font-family:\'Orbitron\',sans-serif;">'+j.gols+' ⚽</span>'+
              (j.golsFaseGrupos > 0 ? '<span style="font-size:10px;color:var(--text-muted);">(FG: '+j.golsFaseGrupos+')</span>' : '')+
              (j.golsFinal > 0 ? '<span style="font-size:10px;color:#ffd600;">(F: '+j.golsFinal+')</span>' : '')+
              (isArtilheiro ? '🎯' : '')+
            '</div>';
          }).join('')+
        '</div>'+
        '<div style="font-size:10px;color:var(--text-muted);margin-top:4px;text-align:right;">Total: '+edicao.todosOsGols.reduce(function(t,j){return t+(j.gols||0);},0)+' gols</div>'
       : '<div style="color:var(--text-muted);">Nenhum gol registrado</div>')+
    '</div>'+
    '<div style="background:rgba(5,8,12,0.4);border-radius:10px;padding:16px;border:1px solid var(--border-color);">'+
      '<div style="font-size:14px;font-weight:700;color:var(--text-secondary);margin-bottom:8px;">📊 CLASSIFICAÇÃO FINAL</div>'+
      (edicao.classificacao?.length ?
        '<div style="display:flex;flex-direction:column;gap:4px;max-height:300px;overflow-y:auto;">'+
          edicao.classificacao.map(function(c) {
            var time = state.times.find(function(t) { return t.id === c.timeId; });
            var posEmoji = c.posicao === 1 ? '🥇' : (c.posicao === 2 ? '🥈' : (c.posicao === 3 ? '🥉' : c.posicao+'.'));
            return '<div style="display:flex;align-items:center;gap:8px;padding:4px 8px;background:rgba(5,8,12,0.3);border-radius:6px;font-size:13px;">'+
              '<span style="font-weight:700;color:var(--text-muted);min-width:30px;">'+posEmoji+'</span>'+
              '<div style="width:24px;height:24px;border-radius:50%;overflow:hidden;border:1px solid var(--border-color);background:rgba(5,8,12,0.5);display:flex;align-items:center;justify-content:center;flex-shrink:0;">'+escudoInline(time, 24)+'</div>'+
              '<span style="font-weight:600;flex:1;">'+c.timeNome+'</span>'+
              '<span style="color:var(--accent-1);font-weight:700;">'+c.pontos+' PTS</span>'+
              '<span style="font-size:10px;color:var(--text-muted);">'+c.vitorias+'V '+c.empates+'E '+c.derrotas+'D</span>'+
            '</div>';
          }).join('')+
        '</div>'
       : '<div style="color:var(--text-muted);">Classificação não disponível</div>')+
    '</div>'+
  '</div>';

  html += '<div style="margin-top:16px;font-size:11px;color:var(--text-muted);text-align:center;border-top:1px solid var(--border-color);padding-top:12px;">'+
    'Finalizado em '+(edicao.dataFinalizacao ? new Date(edicao.dataFinalizacao).toLocaleDateString('pt-BR') : 'data desconhecida')+
    (edicao.totalJogadoresParticipantes ? ' • '+edicao.totalJogadoresParticipantes+' jogadores participantes' : '')+
    (edicao.totalGolsFeitos ? ' • '+edicao.totalGolsFeitos+' gols feitos' : '')+
    (edicao.golsDetalhados?.length ? ' • '+edicao.golsDetalhados.length+' gols registrados' : '')+
    (tevePenalidades ? ' • ⚽ Decidido nos pênaltis' : '')+
  '</div>';

  return html;
}

function setupFirestoreListeners() {
  var collections = ['times', 'jogadores', 'partidas', 'temporadas', 'titulos', 'edicoes'];
  var loaded = 0;

  collections.forEach(function(col) {
    db.collection(col).onSnapshot(function(snapshot) {
      var items = [];
      snapshot.forEach(function(doc) {
        var data = doc.data();
        data.id = doc.id;
        items.push(data);
      });
      state[col] = items;
      loaded++;
      if (loaded >= collections.length) {
        renderDashboard();
        renderTemporadas();
      }
    }, function(error) {
      console.error('Firestore error on', col, ':', error);
      loaded++;
      if (loaded >= collections.length) {
        renderDashboard();
        renderTemporadas();
      }
    });
  });
}

setupFirestoreListeners();

setTimeout(function() {
  renderDashboard();
  renderTemporadas();
}, 3000);
</script>
</body>
</html>
